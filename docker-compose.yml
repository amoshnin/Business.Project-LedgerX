services:
  postgres:
    image: postgres:16
    container_name: ledgerx-postgres
    environment:
      POSTGRES_DB: ledgerx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ledgerx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgerx"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./LedgerX
    container_name: ledgerx-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ledgerx
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CORS_ALLOWED_ORIGINS: http://localhost:3000,https://business-project-ledger-x.vercel.app
    ports:
      - "8080:8080"

volumes:
  ledgerx-postgres-data:
